# ──────────────────────────────────────────────────────────────────────────────
# Deploy to GitHub Pages
#
# Triggers on every push to the main branch.
#
# Google Drive integration:
#   The VITE_GOOGLE_CLIENT_ID variable is baked into the build at compile time.
#   To enable it, create a repository variable (NOT a secret) in:
#     GitHub repo → Settings → Secrets and variables → Actions → Variables tab
#   Name:  VITE_GOOGLE_CLIENT_ID
#   Value: your OAuth 2.0 Client ID from Google Cloud Console
#
#   If the variable is not set, the Google Drive section in Import/Export
#   will be hidden automatically — the rest of the app is unaffected.
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Repository variable — safe to expose, not a secret.
          # See the comment at the top of this file for setup instructions.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
