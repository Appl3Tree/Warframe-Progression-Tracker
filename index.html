<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />

        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />

        <meta
            http-equiv="Cache-Control"
            content="no-cache, no-store, must-revalidate"
        />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />

        <meta name="wfpt-build-id" content="__APP_BUILD_ID__" />

        <title>Warframe Progression Tracker</title>

        <script>
            (() => {
                const BUILD_ID = "__APP_BUILD_ID__";
                const url = new URL(window.location.href);
                const currentVersion = url.searchParams.get("version");

                if (currentVersion !== BUILD_ID) {
                    url.searchParams.set("version", BUILD_ID);
                    window.location.replace(url.toString());
                }
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
